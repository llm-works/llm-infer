# Model-specific configurations
# Matched by model name (from selected.yaml or --model)

locations:
  - !include "../.env.yaml#paths.models.huggingface"

# Model selection
# Priority: CLI --model-path > CLI --model > selection file > selection default
selection:
  embed:
    path: !path ../.models/selected.embed.yaml  # Optional: ops-controlled selection file
    default: bge-small-en-v1.5
  generate:
    path: !path ../.models/selected.yaml  # Optional: ops-controlled selection file
    default: qwen3-1.7b-gptq-int8  # Fallback model name

# =============================================================================
# Templates (YAML anchors for reuse)
# =============================================================================
# Use <<: *anchor for shallow merge, <<: !deep *anchor for deep merge (nested dicts)

templates:
  # Qwen 2.5/3 instruct models - support /think /no_think tokens
  qwen_think: &qwen_think
    system_prompt: null
    think:
      default: false
      enable_suffix: " /think"
      disable_suffix: " /no_think"
      system_prompt: "You MUST wrap all your step-by-step reasoning inside <think></think> XML tags. After </think>, output ONLY the final answer with no explanation."
      tags:
        open: ["<think>", "<thinking>"]
        close: ["</think>", "</thinking>"]

  # Qwen 3.5 models - ignores /think /no_think suffixes, uses chat_template_kwargs
  # to control thinking via vLLM's --default-chat-template-kwargs
  qwen35_think: &qwen35_think
    system_prompt: null
    think:
      default: false
      enable_suffix: null
      disable_suffix: null
      system_prompt: "Show your step-by-step reasoning inside <think></think> XML tags. After </think>, output ONLY the final answer with no explanation."
      tags:
        open: ["<think>", "<thinking>"]
        close: ["</think>", "</thinking>"]
    vllm:
      reasoning_parser: qwen3
      chat_template_kwargs:
        enable_thinking: false

  # DeepSeek R1 distillations - always think, uses <think> tags
  deepseek_r1: &deepseek_r1
    system_prompt: null
    think:
      default: true
      enable_suffix: null
      disable_suffix: null
      tags:
        open: ["<think>"]
        close: ["</think>"]

  # Ollama Qwen models - need explicit instruction (don't follow /think suffix)
  ollama_qwen_think: &ollama_qwen_think
    think:
      default: false
      enable_suffix: "\n\nBefore answering, show your reasoning inside <think></think> tags. Then give the final answer."
      disable_suffix: null
      system_prompt: null
      tags:
        open: ["<think>"]
        close: ["</think>"]

  # vLLM settings for small models and testing - skip CUDA graph capture, shorter context
  vllm_small: &vllm_small
    max_model_len: 4096
    vllm:
      enforce_eager: true  # Skip CUDA graph capture (small model, not worth 2min startup)
      max_num_seqs: 2

  # vLLM settings for regular models - standard 8K context
  vllm_default: &vllm_default
    max_model_len: 8192
    vllm:
      max_num_seqs: 4

  # GPU memory configuration:
  # - gpu_memory_gb: Absolute limit in GB. Use for fixed deployments where you know
  #   the exact GPU size (e.g., 4.0 for 8GB GPU with headroom for OS/other processes).
  # - gpu_memory_utilization: Fraction of GPU memory (0.0-1.0). Use when model needs
  #   dynamic headroom for LoRA adapters or KV cache (e.g., 0.5 for small models
  #   that need overhead for adapter loading).

# =============================================================================
# Models
# =============================================================================

models:
  # ---------------------------------------------------------------------------
  # Embedding models
  # ---------------------------------------------------------------------------
  bge-small-en-v1.5:
    task: embed
    max_model_len: null  # Use model default (512)
    vllm:
      # Prefix caching with concurrent embedding requests causes KeyError crash in V1 engine
      # See: https://github.com/vllm-project/vllm/issues/25991
      enable_prefix_caching: false

  nomic-embed-text:
    task: embed
    ollama: nomic-embed-text

  all-minilm:
    task: embed
    ollama: all-minilm:22m

  # ---------------------------------------------------------------------------
  # Qwen2.5 instruct models
  # ---------------------------------------------------------------------------
  qwen2.5-0.5b-instruct:
    <<: *qwen_think
    <<: !deep *vllm_small
    vllm:
      gpu_memory_gb: 4.0

  qwen2.5-coder-3b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 8.0

  qwen2.5-3b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 8.0

  qwen2.5-3b-instruct-unsloth-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 8.0

  qwen2.5-coder-7b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 8.0

  qwen2.5-coder-14b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 24.0

  qwen2.5-coder-32b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 32.0

  qwen2.5-0.5b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 4.0

  qwen2.5-1.5b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 4.0

  qwen2.5-7b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 10.0

  qwen2.5-14b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 24.0

  qwen2.5-32b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 32.0

  qwen2.5-72b-instruct-bnb-4bit:
    <<: *qwen_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 64.0

  # ---------------------------------------------------------------------------
  # Qwen3 instruct models
  # ---------------------------------------------------------------------------
  qwen3-0.6b-instruct:
    <<: *qwen_think
    <<: !deep *vllm_small
    vllm:
      gpu_memory_utilization: 0.5  # Need headroom for LoRA overhead + KV cache

  qwen3-0.6b-instruct-w4a16:
    <<: *qwen_think
    <<: !deep *vllm_small

  qwen3-1.7b-gptq-int8:
    <<: *qwen_think
    <<: !deep *vllm_small

  qwen3-1.7b-instruct-w4a16:
    <<: *qwen_think
    <<: !deep *vllm_small
    vllm:
      gpu_memory_utilization: 0.5  # Need headroom for LoRA overhead + KV cache

  qwen3-1.7b-instruct:
    <<: *qwen_think
    <<: !deep *vllm_small
    vllm:
      gpu_memory_utilization: 0.5  # Need headroom for LoRA overhead + KV cache

  qwen3-4b-instruct-2507-awq:
    <<: *qwen_think
    <<: !deep *vllm_default

  qwen3-4b-instruct-w4a16:
    <<: *qwen_think
    <<: !deep *vllm_default

  # ---------------------------------------------------------------------------
  # Qwen3.5 instruct models (hybrid Mamba architecture)
  # ---------------------------------------------------------------------------
  qwen3.5-4b:
    <<: *qwen35_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 16.0  # BF16 model ~8GB + headroom for KV cache

  qwen3.5-9b:
    <<: *qwen35_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 32.0  # BF16 model ~19GB + headroom for KV cache

  qwen3.5-9b-awq:
    <<: *qwen35_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 16.0  # AWQ-4bit model ~6GB + headroom for KV cache

  qwen3.5-27b-bnb-4bit-cyberenchanter:
    <<: *qwen35_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 64.0

  qwen3.5-text-9b-bnb-4bit-techwithsergiu:
    <<: *qwen35_think
    <<: !deep *vllm_default
    vllm:
      gpu_memory_gb: 16.0

  # ---------------------------------------------------------------------------
  # DeepSeek R1 distillations
  # ---------------------------------------------------------------------------
  deepseek-r1-distill-qwen-7b:
    <<: *deepseek_r1

  # ---------------------------------------------------------------------------
  # Ollama models
  # ---------------------------------------------------------------------------
  # For Ollama, the 'ollama' field specifies the Ollama model name.
  # Use: llm-infer serve --engine ollama --model <name-below>
  #
  # Note: Ollama models are stored in ~/.ollama/models (or OLLAMA_MODELS path),
  # separate from HuggingFace models in the 'locations' directories.

  llama3.1-8b:
    ollama: llama3.1:8b
    think:
      default: false

  llama3.2-3b:
    ollama: llama3.2:3b
    think:
      default: false

  qwen2.5-7b:
    ollama: qwen2.5:7b
    <<: *ollama_qwen_think

  qwen2.5-coder-7b:
    ollama: qwen2.5-coder:7b
    <<: *ollama_qwen_think

# Defaults for models not explicitly listed
defaults:
  system_prompt: null
  think:
    default: false
    enable_suffix: null
    disable_suffix: null
    tags:
      open: ["<think>", "<thinking>"]
      close: ["</think>", "</thinking>"]
