# vLLM server engine configuration
#
# Connects to a `vllm serve` process via OpenAI-compatible HTTP API.
# llm-infer can auto-start/stop the vllm serve subprocess, or connect
# to an externally managed server.

# Server connection
host: http://localhost
port: 8100                    # vllm serve port (different from llm-infer API port)
timeout: 300                  # Request timeout in seconds
startup_timeout: 300          # Server startup timeout (vllm model loading is slow)

# Server management
auto_start: true              # Automatically start `vllm serve` if not running
binary_path: vllm             # Path to vllm binary

# vLLM engine settings (passed as CLI flags to `vllm serve`)
gpu_memory_utilization: 0.95
max_model_len: null           # Max context length (null = use model default)
max_num_seqs: 16
enforce_eager: false          # Skip CUDA graphs to save GPU memory
dtype: auto                   # auto, float16, bfloat16, float32
trust_remote_code: true
enable_prefix_caching: true

# LoRA/QLoRA adapter support
lora:
  enabled: true              # Enable LoRA adapter support
  max_loras: 4               # Maximum concurrent adapters in GPU memory
  max_lora_rank: 128         # Maximum LoRA rank supported
  base_path: !include "../.env.yaml#paths.adapters"

# Tool calling
tool_call_parser: hermes      # hermes, llama, mistral, etc.

# Warmup: Run initial query on startup to ensure model is loaded
warmup: true

# Dispatch layer concurrency
# Number of concurrent HTTP requests llm-infer sends to vLLM server.
# Works with max_num_seqs: llm-infer sends up to max_concurrent requests,
# vLLM batches them internally (up to max_num_seqs sequences).
max_concurrent: 4
