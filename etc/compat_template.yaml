# Engine Compatibility Specification Template
# ==========================================
#
# This file defines what the infer engine supports. The `models` system
# consumes this spec to filter compatible models before download.
#
# Usage:
#   infer compat generate           # Output spec to stdout
#   infer compat generate -o FILE   # Write spec to file
#   infer compat check              # Verify spec matches implementation
#
# Dynamic values (filled in by `generate`):
#   - engine.version: from pyproject.toml
#   - generated_at: current timestamp
#   - architecture.model_types: from MODEL_POLICIES

version: "1.0"

engine:
  name: infer
  # version: filled dynamically from pyproject.toml

architecture:
  # Supported HuggingFace model_type values (from config.json)
  # Dynamically populated from MODEL_POLICIES + known DefaultPolicy types
  model_types:
    - llama
    - mistral
    - qwen
    - qwen2

  # Architecture constraints - what the engine actually implements
  constraints:
    # Only dense transformers, no Mixture of Experts
    moe: false

    # Only RMSNorm (no LayerNorm, GroupNorm, etc.)
    normalization:
      - rmsnorm

    # Only SwiGLU activation (gate * up -> down, with SiLU gate)
    mlp_activation:
      - swiglu

    # Only Rotary Position Embeddings (no ALiBi, no absolute PE)
    position_embedding:
      - rope

    # Supports both standard multi-head and grouped-query attention
    attention:
      types:
        - mha  # Multi-Head Attention (group_size = 1)
        - gqa  # Grouped-Query Attention (group_size > 1)

      # Backend-specific constraints
      # group_size = num_attention_heads / num_key_value_heads
      #
      # Preferred backend is flashinfer (when available). Models should be
      # compatible with flashinfer constraints for optimal performance.
      preferred_backend: flashinfer
      backends:
        flashinfer:
          # FlashInfer only supports power-of-2 GQA group sizes
          # (as of 2025-12-08, FlashInfer v0.5.2)
          supported_group_sizes: [1, 2, 4, 8, 16, 32]
        naive:
          # Naive PyTorch backend supports any group size (fallback)
          supported_group_sizes: any

format:
  # Supported weight file formats
  weights:
    - safetensors

  # Supported precision (no fp32, no quantization)
  precision:
    - fp16
    - bf16

  # Explicitly unsupported quantization/weight formats
  unsupported_formats:
    - gguf
    - gptq
    - exl2
    - bnb

  # Supported quantization formats
  quantization:
    - awq

config:
  # Required fields in model's config.json
  required_fields:
    - num_hidden_layers
    - num_attention_heads
    - hidden_size
    - intermediate_size
    - vocab_size

  # Optional fields with defaults
  optional_fields:
    - num_key_value_heads  # defaults to num_attention_heads
    - head_dim             # defaults to hidden_size // num_attention_heads
    - rope_theta           # defaults to 10000.0
    - rms_norm_eps         # defaults to 1e-5
    - max_position_embeddings  # defaults to 4096
    - attention_bias       # smart detection based on model_type
    - tie_word_embeddings  # defaults to false

tokenizer:
  # At least one of these must exist
  required_files_any:
    - tokenizer.json
    - tokenizer.model
    - tokenizer_config.json

  # Always required
  required_files:
    - config.json

# Tags that indicate incompatible models (matched against HuggingFace tags)
# This is the primary field consumed by the `models` system
unsupported_tags:
  # MoE architectures
  - qwen3_moe
  - qwen3_next
  - mixtral
  - dbrx
  - deepseek_moe
  - deepseek_v2
  - deepseek_v3

  # Quantized formats (unsupported)
  - gguf
  - gptq
  - exl2
  - bnb

  # Multimodal (text-only supported)
  - vision
  - multimodal
