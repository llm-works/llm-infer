# Engine Compatibility Specification Template
# ==========================================
#
# This file defines what the infer engine supports. The `models` system
# consumes this spec to filter compatible models before download.
#
# Usage:
#   infer compat generate           # Output spec to stdout
#   infer compat generate -o FILE   # Write spec to file
#   infer compat check              # Verify spec matches implementation
#
# Dynamic values (filled in by `generate`):
#   - engine.version: from pyproject.toml
#   - generated_at: current timestamp
#   - architecture.model_types: from MODEL_POLICIES

#
# Generated by: infer compat generate
# Validate with: infer compat check <this-file>

version: '1.0'
engine:
  name: infer
  version: 0.2.0
architecture:
  model_types:
  - granite
  - llama
  - mistral
  - qwen
  - qwen2
  - qwen3
  constraints:
    moe: false
    normalization:
    - rmsnorm
    mlp_activation:
    - swiglu
    position_embedding:
    - rope
    attention:
      types:
      - mha
      - gqa
      preferred_backend: flashinfer
      backends:
        flashinfer:
          supported_group_sizes:
          - 1
          - 2
          - 4
          - 8
          - 16
          - 32
        naive:
          supported_group_sizes: any
format:
  weights:
  - safetensors
  precision:
  - fp16
  - bf16
  unsupported_formats:
  - gguf
  - gptq
  - exl2
  - bnb
  quantization:
  - awq
config:
  required_fields:
  - num_hidden_layers
  - num_attention_heads
  - hidden_size
  - intermediate_size
  - vocab_size
  optional_fields:
  - num_key_value_heads
  - head_dim
  - rope_theta
  - rms_norm_eps
  - max_position_embeddings
  - attention_bias
  - tie_word_embeddings
tokenizer:
  required_files_any:
  - tokenizer.json
  - tokenizer.model
  - tokenizer_config.json
  required_files:
  - config.json
unsupported_tags:
- qwen3_moe
- qwen3_next
- mixtral
- dbrx
- deepseek_moe
- deepseek_v2
- deepseek_v3
- gguf
- gptq
- exl2
- bnb
- vision
- multimodal
