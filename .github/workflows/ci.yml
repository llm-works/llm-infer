name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy types-PyYAML

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy llm_infer/ --ignore-missing-imports

  test:
    name: Test ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch first to avoid CUDA dependencies
          # Use --extra-index-url to keep PyPI for torch's deps (networkx, etc.)
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          # Install appinfra from PyPI
          python -m pip install "appinfra>=0.4.0,<0.5.0"
          # Install package with dev, runtime, and saia extras
          python -m pip install -e ".[dev,runtime,saia]"

      - name: Run unit tests
        run: python -m pytest tests/ -m unit -v --tb=short

  ollama-smoke-test:
    name: Ollama E2E
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install llm-infer
        run: |
          python -m pip install --upgrade pip
          python -m pip install "appinfra>=0.4.0,<0.5.0"
          python -m pip install -e .

      - name: Pull Ollama model
        run: |
          curl -X POST http://localhost:11434/api/pull -d '{"name": "qwen2.5:0.5b"}'
          sleep 5
          curl http://localhost:11434/api/tags | jq .

      - name: Start llm-infer server
        run: |
          llm-infer serve --model qwen2.5:0.5b &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          # Fail explicitly if server never became healthy
          if ! curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
            echo "ERROR: Server failed to start within 60 seconds"
            exit 1
          fi

      - name: Run smoke test
        run: |
          RESPONSE=$(llm-infer query "Say hello in exactly 3 words" --max-tokens 20)
          echo "Response: $RESPONSE"
          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Empty response from server"
            exit 1
          fi
          echo "Smoke test passed!"

      - name: Cleanup
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

  test-summary:
    name: Test
    runs-on: ubuntu-latest
    needs: [test, ollama-smoke-test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.ollama-smoke-test.result }}" != "success" ]]; then
            echo "Ollama smoke test failed"
            exit 1
          fi
          echo "All tests passed"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch first to avoid CUDA dependencies
          # Use --extra-index-url to keep PyPI for torch's deps (networkx, etc.)
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          # Install appinfra from PyPI
          python -m pip install "appinfra>=0.4.0,<0.5.0"
          # Install package with dev, runtime, and saia extras
          python -m pip install -e ".[dev,runtime,saia]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -m unit --cov=llm_infer --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
