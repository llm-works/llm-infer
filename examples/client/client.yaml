# Multi-backend LLM client configuration
#
# Usage:
#   python client.py                           # Interactive chat with default backend
#   python client.py --backend openai          # Use specific backend
#   python client.py --model gpt-4o            # Route by model name
#   python client.py "What is Python?"         # Single question mode

default: local

rate_limit:
  per_minute: 60
  backoff:
    base: 1.0
    max: 60.0

retry:
  enabled: true
  timeout: 0                   # Total retry time in seconds, 0 = forever
  backoff:
    base: 1.0                  # Initial delay between retries
    max: 60.0                  # Max delay between retries (keeps retrying at this interval)

backends:
  local:
    type: openai_compatible
    base_url: http://localhost:8000/v1
    rate_limit:
      per_minute: 120            # Higher rate
    retry:
      enabled: false
    # models:                    # Optional: restrict to specific models
    #   - llama-3.1-8b
    #   - qwen-2.5-7b

  # openai:
  #   enabled: false             # Set to true and add OPENAI_API_KEY env var
  #   type: openai
  #   base_url: https://api.openai.com/v1
